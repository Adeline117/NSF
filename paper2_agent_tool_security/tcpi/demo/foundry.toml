[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2
fs_permissions = [{ access = "read-write", path = "./"}]

[rpc_endpoints]
base_sepolia = "${SEPOLIA_RPC}"
anvil        = "http://127.0.0.1:8545"

# See https://book.getfoundry.sh/reference/config/
