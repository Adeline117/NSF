name: CI

on:
  push:
    branches: [main]
    paths:
      - "paper2_agent_tool_security/**"
  pull_request:
    branches: [main]
    paths:
      - "paper2_agent_tool_security/**"

defaults:
  run:
    working-directory: paper2_agent_tool_security

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/test_analyzer.py -v

      - name: Smoke test — taxonomy export
        run: agent-tool-scanner taxonomy
